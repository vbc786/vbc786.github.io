<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cross-Origin-Opener-Policy" content="unsafe-none">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none">
    <title>VBC TITAN | Professional AI Suite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjijSc9bNh2CXJiEfR7WgCT77CNscSTPs",
            authDomain: "titan-app-vbc.firebaseapp.com",
            projectId: "titan-app-vbc",
            storageBucket: "titan-app-vbc.firebasestorage.app",
            messagingSenderId: "700768811307",
            appId: "1:700768811307:web:32c8afd9dda8133d302d6e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Auto-handle the login result after redirect
        getRedirectResult(auth).catch((error) => console.error("Redirect Error:", error));

        window.login = () => {
            const provider = new GoogleAuthProvider();
            // Switching to Redirect to avoid Popup Blockers
            signInWithRedirect(auth, provider);
        };

        window.activateSystem = async () => {
            const user = auth.currentUser;
            const keyInput = document.getElementById('keyIn').value;
            
            if(keyInput === "TITAN-VBC-2024") { 
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    status: "Active",
                    activatedAt: new Date().toISOString()
                }, { merge: true });
                location.reload();
            } else {
                alert("Invalid Key.");
            }
        };

        onAuthStateChanged(auth, async (user) => {
            const gate = document.getElementById('gateWrapper');
            const mainUI = document.getElementById('mainAppUI');
            const authSection = document.getElementById('authGate');
            const licenseSection = document.getElementById('licenseGate');

            if (user) {
                authSection.classList.add('hidden');
                licenseSection.classList.remove('hidden');
                
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().status === "Active") {
                    gate.classList.add('hidden');
                    mainUI.classList.remove('hidden');
                }
            }
        });
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: white; margin: 0; }
        .vbc-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glow-btn { background: #410CD9; transition: 0.3s; box-shadow: 0 0 15px rgba(65, 12, 217, 0.3); }
        .glow-btn:hover { transform: translateY(-2px); box-shadow: 0 0 25px rgba(65, 12, 217, 0.5); }
    </style>
</head>
<body>

<div id="gateWrapper" class="fixed inset-0 z-[9999] bg-black flex items-center justify-center p-6 text-center">
    <div class="vbc-card max-w-md w-full p-10 rounded-[40px]">
        <h1 class="text-3xl font-black tracking-tighter mb-6 uppercase italic">Titan Phoenix</h1>
        
        <div id="authGate">
            <button onclick="login()" class="w-full py-4 rounded-2xl bg-white text-black font-bold flex items-center justify-center gap-3">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="h-5">
                Login to System
            </button>
        </div>

        <div id="licenseGate" class="hidden">
            <input type="text" id="keyIn" placeholder="ENTER LICENSE KEY" class="w-full p-5 bg-white/5 border border-white/10 rounded-2xl text-center font-black text-xl mb-4 text-white outline-none">
            <button onclick="activateSystem()" class="glow-btn w-full py-5 rounded-2xl font-bold">ACTIVATE ENGINE</button>
        </div>
    </div>
</div>

<div id="mainAppUI" class="hidden min-h-screen bg-[#050505] p-6 lg:p-12">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-4xl font-black uppercase italic tracking-tighter">Command Center</h2>
                <p class="text-green-500 font-bold text-xs tracking-widest mt-1">● SYSTEM ONLINE</p>
            </div>
            <button onclick="auth.signOut().then(()=>location.reload())" class="bg-red-500/10 text-red-500 px-6 py-2 rounded-xl font-bold text-xs border border-red-500/20">LOGOUT</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="vbc-card p-8 rounded-[30px]">
                <p class="text-gray-500 text-xs font-black mb-2 uppercase">Neural Processing</p>
                <h3 class="text-4xl font-black">98.2%</h3>
            </div>
            <div class="vbc-card p-8 rounded-[30px]">
                <p class="text-gray-500 text-xs font-black mb-2 uppercase">Active Nodes</p>
                <h3 class="text-4xl font-black">1,402</h3>
            </div>
            <div class="vbc-card stat-card p-8 rounded-[30px]">
                <p class="text-gray-500 text-xs font-black mb-2 uppercase">Security Level</p>
                <h3 class="text-4xl font-black text-indigo-500">TITAN</h3>
            </div>
        </div>

        <div class="vbc-card w-full h-[400px] rounded-[40px] flex items-center justify-center border-dashed border-white/10">
            <div class="text-center">
                <div class="text-indigo-500 mb-4">
                    <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                </div>
                <h4 class="text-xl font-black uppercase">Welcome to the Core</h4>
                <p class="text-gray-500 text-sm mt-2">All systems are operational. Monitoring session...</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>

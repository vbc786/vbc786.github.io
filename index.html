<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <title>TITAN PHOENIX V12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-premium { background: #6366f1; transition: 0.3s; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); }
        .btn-premium:hover { background: #4f46e5; transform: translateY(-2px); box-shadow: 0 0 40px rgba(99, 102, 241, 0.4); }
        .hidden { display: none !important; }
        input::placeholder { color: #444; }
    </style>
</head>
<body class="h-screen flex items-center justify-center">

<div id="gateWrapper" class="fixed inset-0 z-[9999] bg-black flex flex-col items-center justify-center p-6 text-center">
    <div class="mb-6">
        <img src="logo.png" alt="TITAN LOGO" class="h-32 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">
    </div>

    <div class="glass max-w-sm w-full p-10 rounded-[40px]">
        <h1 class="text-2xl font-extrabold mb-1 tracking-tighter uppercase italic">Titan Phoenix</h1>
        <p class="text-[9px] text-indigo-500 mb-8 uppercase tracking-[0.4em] font-bold">Secure Access Terminal</p>
        
        <input type="password" id="keyIn" placeholder="ENTER ACCESS KEY" 
               class="w-full p-4 bg-[#0a0a0a] rounded-2xl text-center text-white outline-none border border-white/5 font-mono mb-4 focus:border-indigo-500 transition-all">
        
        <button onclick="checkKey()" class="btn-premium w-full py-4 rounded-2xl font-black uppercase tracking-widest text-xs">Authorize Access</button>
        
        <p class="mt-6 text-[8px] text-gray-600 font-bold uppercase tracking-widest">Operator Console v12.0.8</p>
    </div>
</div>

<div id="mainAppUI" class="hidden h-screen w-full flex overflow-hidden">
    <aside class="w-64 bg-[#050505] border-r border-white/5 flex flex-col h-full">
        <div class="p-8 text-center border-b border-white/5">
            <img src="logo.png" alt="Logo" class="h-10 mx-auto mb-3">
            <h2 class="font-black italic text-lg tracking-tighter">PHOENIX V12</h2>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="p-4 rounded-xl bg-indigo-500/10 text-white font-bold text-xs flex items-center gap-3 border-l-4 border-indigo-500"><span>🖼️</span> AI IMAGE STUDIO</div>
            <div class="p-4 text-gray-500 font-bold text-xs flex items-center gap-3 hover:text-white transition cursor-pointer"><span>✂️</span> BG REMOVER</div>
            <div class="p-4 text-gray-500 font-bold text-xs flex items-center gap-3 hover:text-white transition cursor-pointer"><span>🪄</span> MAGIC ERASER</div>
            <div class="p-4 text-gray-500 font-bold text-xs flex items-center gap-3 hover:text-white transition cursor-pointer"><span>🤖</span> TITAN CHAT</div>
        </nav>
        <div class="p-6">
            <button onclick="logout()" class="w-full py-3 rounded-xl bg-white/5 text-red-500 font-bold text-[10px] uppercase tracking-widest border border-red-500/10 hover:bg-red-500 hover:text-white transition">Terminate</button>
        </div>
    </aside>
